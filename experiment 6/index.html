<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Page</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">
        <h2 id="mainHeading">Welcome to Javascript</h2>
        <br>
        <input type="text" id="userInput" placeholder="Enter new heading">
        <br><br>
        <button id="changeTextBtn">Change Heading</button>
        <button id="fontSizeBtn">Increase Font size</button>
        <button id="bgColorBtn">Change Background</button>
        <button id="toggleBtn">Show/Hide Paragraph</button>
        <button id="resetBtn">Reset</button>
        
        <div class="box">
            <p id="paragraph">This is a sample paragraph. Javascript events can dynamically change container.</p>
        </div>
        <p><H3>Aayushi Sharma</H3></p>
    <p><h4>Roll Number: 2503201000022</h4></p>
    </div>
    <script src="main.jsx"></script>
</body>
</html>
