<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | Electronics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">TechStore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainMenu">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1 d-flex align-items-center">
        <div class="row g-4 justify-content-center w-100 mx-auto">
            
            <div class="col-sm-10 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="bg-white rounded-xl shadow-sm hover:-translate-y-1 transition-transform duration-200 w-100 max-w-[360px] overflow-hidden flex flex-col">
                    <img src="laptop.webp" class="h-[190px] w-full object-contain p-5 bg-white mx-auto" alt="Laptop">
                    <div class="p-6 text-center flex flex-col items-center justify-content-center flex-grow">
                        <h5 class="font-bold text-lg mb-2">Laptop</h5>
                        <p class="text-gray-500 text-sm mb-3">High performance laptop</p>
                        <p class="text-gray-800 font-semibold text-xl flex items-center justify-content-center gap-2 mb-4">
                            ₹50,000 
                            <span class="bg-emerald-600 text-white text-xs px-2 py-1 rounded font-normal">New</span>
                        </p>
                        <button class="btn btn-primary rounded-md px-4 py-1.5" data-bs-toggle="modal" data-bs-target="#detailsModal" onclick="setModalContent('Laptop', 'High performance laptop with advanced features.', '₹50,000')">
                            View Details
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-sm-10 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="bg-white rounded-xl shadow-sm hover:-translate-y-1 transition-transform duration-200 w-100 max-w-[360px] overflow-hidden flex flex-col">
                    <img src="phone.webp" class="h-[190px] w-full object-contain p-5 bg-white mx-auto" alt="Mobile">
                    <div class="p-6 text-center flex flex-col items-center justify-content-center flex-grow">
                        <h5 class="font-bold text-lg mb-2">Mobile</h5>
                        <p class="text-gray-500 text-sm mb-3">Latest smartphone</p>
                        <p class="text-gray-800 font-semibold text-xl flex items-center justify-content-center gap-2 mb-4">
                            ₹30,000 
                            <span class="bg-red-600 text-white text-xs px-2 py-1 rounded font-normal">Sale</span>
                        </p>
                        <button class="btn btn-primary rounded-md px-4 py-1.5" data-bs-toggle="modal" data-bs-target="#detailsModal" onclick="setModalContent('Mobile', 'Latest flagship smartphone with pro camera.', '₹30,000')">
                            View Details
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-sm-10 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="bg-white rounded-xl shadow-sm hover:-translate-y-1 transition-transform duration-200 w-100 max-w-[360px] overflow-hidden flex flex-col">
                    <img src="headphone.webp" class="h-[190px] w-full object-contain p-5 bg-white mx-auto" alt="Headphones">
                    <div class="p-6 text-center flex flex-col items-center justify-content-center flex-grow">
                        <h5 class="font-bold text-lg mb-2">Headphones</h5>
                        <p class="text-gray-500 text-sm mb-3">Noise cancelling</p>
                        <p class="text-gray-800 font-semibold text-xl flex items-center justify-content-center gap-2 mb-4">
                            ₹5,000 
                            <span class="bg-emerald-600 text-white text-xs px-2 py-1 rounded font-normal">New</span>
                        </p>
                        <button class="btn btn-primary rounded-md px-4 py-1.5" data-bs-toggle="modal" data-bs-target="#detailsModal" onclick="setModalContent('Headphones', 'Premium noise cancelling headphones.', '₹5,000')">
                            View Details
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center rounded-xl overflow-hidden">
                <div class="modal-header d-flex justify-content-center position-relative border-0 pt-6">
                    <h5 class="modal-title font-bold text-xl mx-auto" id="modalProductTitle">Product Details</h5>
                    <button type="button" class="btn-close position-absolute end-0 me-4 top-50 translate-middle-y" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-6 py-4">
                    <p id="modalProductDesc" class="text-gray-500 text-sm mb-3"></p>
                    <h4 id="modalProductPrice" class="text-blue-600 font-bold text-2xl"></h4>
                </div>
                <div class="modal-footer border-0 pb-6 justify-content-center gap-3">
                    <button type="button" class="btn btn-secondary px-4 py-2 text-sm" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success px-4 py-2 text-sm">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-gray-900 text-gray-400 py-6 text-center mt-auto">
        <div class="container">
            <p class="m-0 text-sm">© 2026 TechStore | Follow us on social media</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setModalContent(name, description, price) {
            document.getElementById('modalProductTitle').innerText = name;
            document.getElementById('modalProductDesc').innerText = description;
            document.getElementById('modalProductPrice').innerText = "Price: " + price;
        }
    </script>
</body>
</html>
