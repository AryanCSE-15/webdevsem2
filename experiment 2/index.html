<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore | Electronics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">TechStore</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainMenu">
                <ul class="navbar-nav ms-auto text-center">
                    <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5 flex-grow-1 d-flex align-items-center">
        <div class="row g-4 justify-content-center w-100 mx-auto">
            
            <div class="col-sm-10 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="card product-card w-100">
                    <img src="laptop.webp" class="card-img-top mx-auto" alt="Laptop">
                    <div class="card-body text-center d-flex flex-column align-items-center justify-content-center">
                        <h5 class="fw-bold">Laptop</h5>
                        <p class="text-muted">High performance laptop</p>
                        <p class="price-display">₹50,000 <span class="badge status-new">New</span></p>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#detailsModal" onclick="setModalContent('Laptop', 'High performance laptop with advanced features.', '₹50,000')">
                            View Details
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-sm-10 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="card product-card w-100">
                    <img src="phone.webp" class="card-img-top mx-auto" alt="Mobile">
                    <div class="card-body text-center d-flex flex-column align-items-center justify-content-center">
                        <h5 class="fw-bold">Mobile</h5>
                        <p class="text-muted">Latest smartphone</p>
                        <p class="price-display">₹30,000 <span class="badge status-sale">Sale</span></p>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#detailsModal" onclick="setModalContent('Mobile', 'Latest flagship smartphone with pro camera.', '₹30,000')">
                            View Details
                        </button>
                    </div>
                </div>
            </div>

            <div class="col-sm-10 col-md-6 col-lg-4 d-flex justify-content-center">
                <div class="card product-card w-100">
                    <img src="headphone.webp" class="card-img-top mx-auto" alt="Headphones">
                    <div class="card-body text-center d-flex flex-column align-items-center justify-content-center">
                        <h5 class="fw-bold">Headphones</h5>
                        <p class="text-muted">Noise cancelling</p>
                        <p class="price-display">₹5,000 <span class="badge status-new">New</span></p>
                        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#detailsModal" onclick="setModalContent('Headphones', 'Premium noise cancelling headphones.', '₹5,000')">
                            View Details
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div class="modal fade" id="detailsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center">
                <div class="modal-header d-flex justify-content-center position-relative border-0 pt-4">
                    <h5 class="modal-title fw-bold mx-auto" id="modalProductTitle">Product Details</h5>
                    <button type="button" class="btn-close position-absolute end-0 me-3 top-50 translate-middle-y" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="modalProductDesc" class="text-secondary"></p>
                    <h4 id="modalProductPrice" class="text-primary fw-bold"></h4>
                </div>
                <div class="modal-footer border-0 pb-4 justify-content-center">
                    <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-success px-4">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>
    <div class="footer-info text-center my-4">
    <h3>Aayushi Sharma</h3>
    <h4>Roll Number: 2503201000022</h4>
</div>
    <footer class="main-footer text-center mt-auto">
        <div class="container">
            <p class="mb-0">© 2026 TechStore | Follow us on social media</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function setModalContent(name, description, price) {
            document.getElementById('modalProductTitle').innerText = name;
            document.getElementById('modalProductDesc').innerText = description;
            document.getElementById('modalProductPrice').innerText = "Price: " + price;
        }
    </script>
</body>
</html>
